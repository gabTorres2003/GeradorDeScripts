<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processamento em Massa - Neoenergia</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .bulk-area { width: 100%; height: 120px; margin-bottom: 20px; border: 2px dashed var(--primary); padding: 10px; border-radius: 8px; }
        .nav-bar { display: flex; flex-direction: column; gap: 10px; background: #fff; padding: 10px 0; margin-bottom: 20px; border-bottom: 1px solid #eee; }
        .nav-row { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        .btn-nav-queue { background: #e0e0e0; border: none; padding: 10px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; color: #666; transition: 0.2s; }
        .btn-priority { background: #d1e3f5 !important; color: #1976d2 !important; flex: 1; font-size: 0.85em; }
        .counter { font-weight: bold; color: var(--primary); font-size: 1.2em; }
        .hidden { display: none !important; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; margin-left: 8px; border: 1px solid; }
        .tag-gse { background: #e3f2fd; color: #1976d2; border-color: #bbdefb; }
        .tag-ue { background: #fff3e0; color: #ef6c00; border-color: #ffe0b2; }
        .tag-nota { background: #f5f5f5; color: #666; border-color: #ddd; }
        .card-container { padding: 20px; border-radius: 12px; transition: background 0.3s ease; border: 1px solid transparent; }
        .error-overlay { background: #fee2e2; border: 1px solid #ef4444; color: #b91c1c; padding: 15px; border-radius: 6px; margin-bottom: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); margin-bottom: 15px; padding-bottom: 10px;">
            <h2 style="border: none; margin: 0;">Fila de Processamento em Massa</h2>
            <a href="index.html" class="btn-nav">← Voltar</a>
        </div>

        <div id="errorMsg" class="error-overlay"></div>

        <div id="import-section" class="hidden">
            <p style="margin-bottom: 10px; color: #666;">Cole a tabela do ServiceNow:</p>
            <textarea id="bulkPaste" class="bulk-area" placeholder="Cole a tabela com o cabeçalho aqui..."></textarea>
            <button class="btn-generate" style="width: 100%;" onclick="window.importarParaFila()">Iniciar Automação</button>
            <button class="btn-clear" style="width: 100%; margin-top: 10px;" onclick="window.toggleImport(false)">Cancelar</button>
        </div>

        <div id="queue-section">
            <div class="nav-bar">
                <div class="nav-row">
                    <button class="btn-nav-queue" onclick="window.navegar(-1)">← Anterior</button>
                    <span class="counter" id="lblContador">Aguardando Lista...</span>
                    <button class="btn-nav-queue" onclick="window.navegar(1)">Próximo →</button>
                </div>
                <div class="nav-row" style="gap: 10px;">
                    <button class="btn-nav-queue btn-priority" onclick="window.navegarSeletivo(-1)">← Anterior GSE/UE</button>
                    <button class="btn-nav-queue btn-priority" onclick="window.navegarSeletivo(1)">Próximo GSE/UE →</button>
                </div>
            </div>

            <div id="card-atendimento" class="card-container">
                <div class="type-selector" id="area-tipo">
                    <span class="type-label">Tipo:</span>
                    <div class="radio-group">
                        <label class="radio-option"><input type="radio" name="acao" value="unlock" checked onchange="window.gerarInstantaneo()"> Desbloqueio</label>
                        <label class="radio-option"><input type="radio" name="acao" value="reset" onchange="window.gerarInstantaneo()"> Reset</label>
                    </div>
                </div>

                <div class="input-group">
                    <div class="field"><label>INC:</label><input type="text" id="registro" readonly placeholder="Ex: INC123456"></div>
                    <div class="field">
                        <label>Aplicação:</label>
                        <div style="display: flex; align-items: center;">
                            <input type="text" id="sistema_txt" readonly style="font-weight: bold;">
                            <span id="tag_sistema" class="status-tag"></span>
                        </div>
                    </div>
                    <div class="field" style="grid-column: span 2"><label>Colaborador:</label><input type="text" id="nome" readonly placeholder="Nome completo do colaborador"></div>
                    <div class="field"><label>Login:</label><input type="text" id="matricula" readonly placeholder="E976850"></div>
                    <div class="field"><label>Criado em:</label><input type="text" id="data_txt" readonly></div>
                    <div class="field" style="grid-column: span 2" id="campoSenhaMassa">
                        <label id="lblSenha">Senha Gerada:</label>
                        <input type="text" id="senha" placeholder="Cole a senha padrão GSE ou digite aqui..." oninput="window.gerarInstantaneo()">
                    </div>
                </div>
            </div>

            <div class="buttons" style="margin-top: 15px;">
                <button class="btn-clear" onclick="window.toggleImport(true)">Nova Lista</button>
                <button class="btn-generate" onclick="window.gerarInstantaneo()">Gerar Scripts</button>
            </div>

            <div class="output-section" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="output-box">
                    <div class="output-header"><h3>E-mail</h3><button class="btn-copy" onclick="window.execCopiar('outEmail', this)">Copiar</button></div>
                    <textarea id="outEmail" readonly></textarea>
                </div>
                <div class="output-box">
                    <div class="output-header"><h3>Chamado</h3><button class="btn-copy" onclick="window.execCopiar('outChamado', this)">Copiar</button></div>
                    <textarea id="outChamado" readonly></textarea>
                </div>
                <div class="output-box">
                    <div class="output-header"><h3>Nota (15 min)</h3><button class="btn-copy" onclick="window.execCopiar('outNota', this)">Copiar</button></div>
                    <textarea id="outNota" readonly></textarea>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/mass-process.js"></script>
</body>
</html>
